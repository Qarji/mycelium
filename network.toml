# Конфигурация сети КИИ
[simulation]
max_ticks = 35  # длительность симуляции (в тиках)
tick_interval_ms = 1000  # пауза между тиками (мс)

[topology]
links = [
    { id = 1, neighbors = [2, 5, 6, 9] },
    { id = 2, neighbors = [1, 3, 4, 5] },
    { id = 3, neighbors = [2, 4, 7, 8, 10] },
    { id = 4, neighbors = [2, 3] },
    { id = 5, neighbors = [1, 2, 8] },
    { id = 6, neighbors = [1] },
    { id = 7, neighbors = [3, 9] },
    { id = 8, neighbors = [3, 5] },
    { id = 9, neighbors = [1, 7] },
    { id = 10, neighbors = [3] },
]

[node_defaults]
load = 70
temperature = 40
active_connections = 100
failed_auth_count = 0
last_sync_time = 0

[load_calibration]
reduce_factor = 0.20  # -20% за тик
boost_factor = 0.15  # +15% за тик
reduce_floor = 40  # минимум нагрузки
boost_ceiling = 100  # максимум нагрузки
hold_ticks = 2  # длительность режима
conn_scale_factor = 0.45  # connections меняются на N% от изменения нагрузки

[security]
threat_score_normal = 0.4 # верхняя граница допустимой угрозы узла
stale_ttl = 2  # актуальность NodeSignal (в тиках)
node_stale_ttl = 3  # узел считается упавшим через N тиков
max_len_neighbor_signals = 10
max_count_signals_from_neighbor = 2
peer_suspicion_threshold = 2  # сколько МИНИМУМ голосов нужно для принудительной изоляции
threat_score_isolation = 0.7  # порог threat_score для EnterIsolation
max_failed_auth = 15
max_reconnect_attempts = 5  # порог отказа в реконнекте (в тиках)
min_quarantine_ticks = 4 # минимум тиков в принудительной изоляции

[ai]
self_model_path = "ai_model/self_model.py"  # относительно CARGO_MANIFEST_DIR
neighbor_model_path = "ai_model/neighbor_model.py"
ticks_to_degraded = 5
ticks_to_normal = 5

[persistence]
log_dir = "logs"  # директория для логов
flush_every_ticks = 1  # как часто сбрасывать буфер на диск
